# High-Availability Nginx Upstream Reverse Proxy Configuration
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimizing connection times and buffers
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hardening: Disable server banners (OWASP A05)

    # Gzip Compression to increase loading speeds
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Dynamic API Application Server Pool (Load balancer Upstream)
    upstream talentbridge_api_servers {
        least_conn; # Route requests to server with least connections
        server app-service-1:3000 max_fails=3 fail_timeout=10s;
        server app-service-2:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Direct security filtering rule for large buffers / body injection limits
        client_max_body_size 15M;
        client_body_buffer_size 128k;

        # Hardening response headers in proxy responses
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Forward actual client IPs for accurate telemetry and auth limit logs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Route regular APIs & websocket sockets to our redundant Node app clusters
        location / {
            proxy_pass http://talentbridge_api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
        }

        # Cache static files at Nginx tier for extreme file delivery speed
        location /uploads/ {
            proxy_pass http://talentbridge_api_servers;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
