user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000; # Support high-concurrency 
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance Tuning: Zero-copy in-kernel file transfer
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Avoid leaking Nginx version metadata

    # Temp Buffers protection against Buffer-overflow and large payload DDoS strikes
    client_body_buffer_size 128k;
    client_max_body_size 15M; # Permit resumes up to 15MB
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Gzip Compression to minimize bandwidth latencies
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        text/javascript;

    # Production Load-Balancing Upstream Array
    upstream talentbridge_backend {
        server api-service-1:3000 max_fails=3 fail_timeout=10s;
        server api-service-2:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Enforce instant HTTPS redirection in Production
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name talentbridge.career;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/talentbridge.career/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/talentbridge.career/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3; # Deprecate unsafe legacy algorithms (TLS 1.0, 1.1)
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        # Session resumption cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OWASP Top 10 Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Static Assets CDN Fallback & Browser Cache
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, no-transform";
            access_log off;
            try_files $uri =404;
        }

        # API Proxypass Router
        location /api/ {
            proxy_pass http://talentbridge_backend;
            proxy_http_version 1.1;
            
            # WebSocket Pass-through setup for AI Mock Interviews
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Secure Origin Propagation
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Client buffer optimization inside proxy
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_connect_timeout 15s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;
        }

        # SPA Frontend Index Routing
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
